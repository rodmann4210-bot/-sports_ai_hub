<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI Hub — Ask the Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Barlow:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--burgundy:#b3122e;--gold:#f3c14b;--bg:#0a0f1c;--panel:#141b30;--ink:#f3ece0;--line:rgba(243,193,75,.22);}
  body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;margin:0;padding:0}
  .ai-header{position:sticky;top:0;background:var(--bg);padding:20px;border-bottom:1px solid var(--line);z-index:1000}
  .nav-bar{display:flex;gap:10px;margin-top:15px;overflow-x:auto}
  .tab-btn{background:var(--panel);color:#a9b4c8;padding:10px 20px;border:1px solid var(--line);cursor:pointer;text-transform:uppercase;font-family:'Oswald'}
  .tab-btn.active{background:var(--burgundy);color:var(--gold)}
  .content{padding:20px}
  .card{background:var(--panel);padding:20px;margin-bottom:15px;border:1px solid var(--line)}
  .tray{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px}
  .weather-alert{color:#ff8275;font-weight:700}
</style>
</head>
<body>
<div class="ai-header">
  <input type="text" placeholder="Ask the Stats..." style="width:100%;padding:12px;background:var(--panel);color:white;border:1px solid var(--gold)">
  <div class="nav-bar" id="hubNav">
    <button class="tab-btn active" data-id="mlb">MLB Grid</button>
    <button class="tab-btn" data-id="nfl">NFL Grid</button>
    <button class="tab-btn" data-id="mls">MLS Grid</button>
    <button class="tab-btn" data-id="nascar">NASCAR Cup Series</button>
    <button class="tab-btn" data-id="space">SpaceX Launchwatch</button>
  </div>
</div>

<div id="mlb" class="content">
  <div class="card"><h2>Cardinals Command Center</h2><p>Pitcher vs. Team Stats: Active | <a href="#" style="color:var(--gold)">View Full Stats</a></p></div>
  <div class="tray"><div class="card">Stats Panel</div><div class="card">Betting/Gameday Tray</div></div>
  <div class="card"><h3>League Daily Scoreboard</h3><p>All Games: Loading data...</p></div>
</div>

<div id="space" class="content" style="display:none;">
  <div class="card"><h3>Prior Mission History</h3><div id="history">Loading completed missions...</div></div>
  <div class="card" id="hero"><h2>Next Launch: Acquiring...</h2></div>
  <div id="launchGrid"></div>
</div>

<script>
document.getElementById('hubNav').addEventListener('click', e => {
    if(!e.target.classList.contains('tab-btn')) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
    document.getElementById(e.target.dataset.id).style.display = 'block';
});
async function initSpaceX() {
    try {
        const res = await fetch('https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=3');
        const data = await res.json();
        const next = data.results[0];
        document.getElementById('hero').innerHTML = `<h2>Next Launch: ${next.name}</h2><p class="weather-alert">T-0 Weather Forecast: Nominal</p><a href="${next.vidURLs?.[0]?.url||'#'}" target="_blank">Watch on YouTube</a>`;
    } catch(e) { console.error(e); }
}
initSpaceX();
</script>
</body>
</html>
