<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root{--bg:#0a0f1c;--panel:#141b30;--gold:#f3c14b;--ink:#f3ece0}
body{background:var(--bg);color:var(--ink);font-family:sans-serif;padding:20px}

/* The "Floating" Container */
.tray-container {
    background: var(--panel);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    /* Layered shadows create the "lifted" look */
    box-shadow: 0 4px 6px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
}

.tray-header { font-weight: 700; text-transform: uppercase; margin-bottom: 15px; color: var(--gold); }
</style>
</head>
<body>

<!-- This block will render as a floating element -->
<div class="tray-container">
    <div class="tray-header">Betting / Film Room</div>
    <p>Trays now floating with CSS depth.</p>
</div>

</body>
</html>
