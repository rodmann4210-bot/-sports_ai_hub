<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI Hub — Ask the Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
<style>
  body { background: #0a0f1c; color: #f3ece0; font-family: 'Barlow', sans-serif; margin: 0; padding: 20px; }
  .ai-header { position: sticky; top: 0; background: #0a0f1c; padding: 10px 0; border-bottom: 1px solid #c79a3a; z-index: 1000; }
  .nav-bar { display: flex; gap: 10px; margin-top: 15px; }
  .tab-btn { background: #141b30; color: #a9b4c8; padding: 10px 20px; border: none; cursor: pointer; text-transform: uppercase; font-family: 'Oswald'; }
  .tab-btn.active { background: #b3122e; color: #f3c14b; }
  .content-area { margin-top: 20px; }
</style>
</head>
<body>
<div class="ai-header">
  <input type="text" placeholder="Ask the Stats..." style="width: 100%; padding: 12px; background: #141b30; border: 1px solid #c79a3a; color: white;">
  <div class="nav-bar" id="hubNav">
    <button class="tab-btn active" data-id="mainHubContent">MLB Grid</button>
    <button class="tab-btn" data-id="mainHubContent">NFL Grid</button>
    <button class="tab-btn" data-id="mainHubContent">MLS Grid</button>
    <button class="tab-btn" data-id="mainHubContent">NASCAR Cup Series</button>
    <button class="tab-btn" data-id="spacexContent">SpaceX Launchwatch</button>
  </div>
</div>
<div id="mainHubContent" class="content-area"><h2>Sports Dashboard Initialized</h2><p>Data Feed Active: Ready for input.</p></div>
<div id="spacexContent" class="content-area" style="display:none;"><h2>SpaceX Launchwatch Active</h2><div id="launchGrid">Loading telemetry...</div></div>
<script>
document.getElementById('hubNav').addEventListener('click', e => {
    if(!e.target.classList.contains('tab-btn')) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('mainHubContent').style.display = e.target.dataset.id === 'spacexContent' ? 'none' : 'block';
    document.getElementById('spacexContent').style.display = e.target.dataset.id === 'spacexContent' ? 'block' : 'none';
});
</script>
</body>
</html>
