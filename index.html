<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI Hub</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald&family=Barlow&display=swap">
<style>
  :root{--burgundy:#b3122e;--gold:#f3c14b;--bg:#0a0f1c;--panel:#141b30;--ink:#f3ece0;}
  body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;margin:0;padding:15px;}
  .hub-nav{display:flex;gap:5px;margin-bottom:20px;overflow-x:auto;}
  .hub-btn{background:var(--panel);color:var(--ink);padding:12px;border-radius:6px;border:1px solid #222;cursor:pointer;}
  .hub-btn.active{background:var(--burgundy);color:var(--gold);}
  .gameday-row{display:none;background:var(--panel);padding:15px;border-radius:8px;}
  .gameday-row.active{display:block;}
  .btn{display:block;background:var(--burgundy);color:var(--gold);text-align:center;padding:15px;margin-top:15px;text-decoration:none;border-radius:6px;font-weight:bold;border:none;}
</style>
</head>
<body>

<nav class="hub-nav" id="hubNav">
  <button class="hub-btn active" data-target="mlb">MLB</button>
  <button class="hub-btn" data-target="nfl">NFL</button>
  <button class="hub-btn" data-target="nascar">NASCAR</button>
</nav>

<div id="mlb" class="gameday-row active">MLB Data Deck</div>
<div id="nfl" class="gameday-row">NFL Data Deck</div>
<div id="nascar" class="gameday-row">
  <div>JGR Garage Log</div>
  <a href="https://www.nascar.com/results/live/racecenter/" target="_blank" class="btn">Launch NASCAR Race Center</a>
</div>

<script>
document.getElementById('hubNav').addEventListener('click', e => {
  if(!e.target.classList.contains('hub-btn')) return;
  document.querySelectorAll('.hub-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.gameday-row').forEach(r => r.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(e.target.dataset.target).classList.add('active');
});
</script>
</body>
</html>
