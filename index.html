<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI Hub</title>
<style>
  :root{--burgundy:#b3122e;--gold:#f3c14b;--bg:#0a0f1c;--panel:#141b30;--ink:#f3ece0;}
  body{background:var(--bg);color:var(--ink);font-family:sans-serif;margin:0;padding:10px;}
  .hub-nav{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;}
  .hub-btn{background:var(--panel);color:var(--ink);padding:10px;border-radius:5px;border:none;white-space:nowrap;}
  .hub-btn.active{background:var(--burgundy);color:var(--gold);}
  .gameday-row{display:none;margin-top:15px;background:var(--panel);padding:15px;border-radius:8px;}
  .gameday-link-btn{display:none;width:100%;text-align:center;background:var(--burgundy);color:var(--gold);padding:15px;margin-top:10px;text-decoration:none;border-radius:5px;font-weight:bold;}
</style>
</head>
<body>

<nav class="hub-nav" id="hubNav">
  <button class="hub-btn active" data-id="mlb">MLB</button>
  <button class="hub-btn" data-id="nfl">NFL</button>
  <button class="hub-btn" data-id="nascar">NASCAR</button>
</nav>

<!-- Static Containers -->
<div id="mlb-box" class="gameday-row">MLB Preview Card</div>
<a id="mlb-link" href="https://www.mlb.com/gameday/braves-vs-cardinals/2026/07/11/823030/preview" class="gameday-link-btn" style="display:block;">Launch MLB Gameday</a>

<div id="nfl-box" class="gameday-row">NFL Preview Card</div>
<a id="nfl-link" href="https://www.espn.com/nfl/scoreboard" class="gameday-link-btn">Launch NFL Scoreboard</a>

<div id="nascar-box" class="gameday-row">NASCAR Garage Log</div>
<a id="nascar-link" href="https://www.nascar.com/results/live/racecenter/" class="gameday-link-btn">Launch NASCAR Race Center</a>

<script>
const btns = document.querySelectorAll('.hub-btn');
btns.forEach(btn => {
  btn.addEventListener('click', () => {
    btns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // Hide all containers
    document.querySelectorAll('.gameday-row, .gameday-link-btn').forEach(el => el.style.display = 'none');
    
    // Show selected
    const id = btn.dataset.id;
    document.getElementById(id + '-box').style.display = 'block';
    document.getElementById(id + '-link').style.display = 'block';
  });
});
</script>
</body>
</html>
