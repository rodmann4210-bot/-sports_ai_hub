<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#0a0f1c;--panel:#141b30;--gold:#f3c14b;--burgundy:#b3122e;--ink:#f3ece0}
body{background:var(--bg);color:var(--ink);font-family:sans-serif;margin:0;padding:20px}

/* Navigation & Header */
.ai-header{margin-bottom:20px}
.nav-bar{display:flex;gap:10px;margin-bottom:20px}
.tab-btn{background:var(--panel);color:#a9b4c8;padding:10px 20px;border:1px solid rgba(243,193,75,.22);cursor:pointer;text-transform:uppercase}
.tab-btn.active{background:var(--burgundy);color:var(--gold)}

/* Correct Floating Tray Style */
.floating-tray {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.5);
}
.tray-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.elevated-btn{display:block;width:100%;background:var(--gold);color:var(--bg);border:none;padding:15px;margin-bottom:10px;border-radius:8px;font-weight:700;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 0 #b3923a}
</style>
</head>
<body>
<div class="ai-header">
    <div class="nav-bar">
        <button class="tab-btn active">MLB Grid</button>
        <button class="tab-btn">NFL Grid</button>
    </div>
</div>

<!-- Integrated Floating Trays -->
<div class="floating-tray">
    <h2>Cardinals Command Center</h2>
    <div class="tray-grid">
        <div>Roster Data Area</div>
        <div class="sidebar">
            <button class="elevated-btn">Betting</button>
            <button class="elevated-btn">Film Room</button>
        </div>
    </div>
</div>
</body>
</html>
