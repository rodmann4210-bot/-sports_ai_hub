<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background: #0a0f1c; color: #f3ece0; font-family: sans-serif; padding: 10px; }
  .tab-content { display: none; padding-top: 20px; }
  #mlb:checked ~ #mlb-content, #nfl:checked ~ #nfl-content, #nascar:checked ~ #nascar-content { display: block; }
  input { display: none; }
  label { background: #141b30; padding: 10px 20px; border-radius: 5px; cursor: pointer; border: 1px solid #b3122e; }
  input:checked + label { background: #b3122e; }
  .btn { display: block; background: #b3122e; color: #f3c14b; text-align: center; padding: 15px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<input type="radio" name="tabs" id="mlb" checked> <label for="mlb">MLB</label>
<input type="radio" name="tabs" id="nfl"> <label for="nfl">NFL</label>
<input type="radio" name="tabs" id="nascar"> <label for="nascar">NASCAR</label>

<div id="mlb-content" class="tab-content">
  <div>MLB Content Here</div>
  <a href="https://www.mlb.com/gameday/braves-vs-cardinals/2026/07/11/823030/preview" class="btn">Launch MLB Gameday</a>
</div>

<div id="nfl-content" class="tab-content">
  <div>NFL Content Here</div>
  <a href="https://www.espn.com/nfl/scoreboard" class="btn">Launch NFL Scoreboard</a>
</div>

<div id="nascar-content" class="tab-content">
  <div>NASCAR Content Here</div>
  <a href="https://www.nascar.com/results/live/racecenter/" class="btn">Launch NASCAR Race Center</a>
</div>

</body>
</html>
