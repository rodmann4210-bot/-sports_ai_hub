<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#0a0f1c;--panel:#141b30;--gold:#f3c14b;--burgundy:#b3122e;--ink:#f3ece0}
body{background:var(--bg);color:var(--ink);font-family:sans-serif;margin:0;padding:20px}
.dashboard-grid{display:grid;grid-template-columns:1fr auto;gap:20px}
.floating-card{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);padding:20px}
.sidebar-buttons{display:flex;flex-direction:column;gap:10px}
.elevated-btn{background:var(--gold);color:var(--bg);border:none;padding:15px 30px;border-radius:8px;font-weight:700;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 0 #b3923a}
</style>
</head>
<body>
<div class="dashboard-grid">
<div class="floating-card">
<h2>Cardinals Watch</h2>
<p>Your Team — Every Day — The Birds</p>
</div>
<div class="sidebar-buttons">
<button class="elevated-btn">Betting</button>
<button class="elevated-btn">Film Room</button>
</div>
</div>
</body>
</html>
